  <style>
    /* Existing Bio Styles */
    .bio-container {
      display: flex;
      align-items: flex-start;
      gap: 30px;
      margin-bottom: 40px;
    }

    .bio-text {
      flex: 1;
    }

    .bio-photo img {
      width: 280px;
      height: auto;
      border-radius: 8px;
      border: 1px solid #ccc;

    /* --- Photo Timeline Styles --- */
    .photo-timeline {
      margin-top: 50px;
    }

    .photo-timeline h2 {
      margin-bottom: 30px;
      border-bottom: 2px solid #eee;
      padding-bottom: 10px;
    }

    .gallery-grid {
      display: grid;
      /* Automatically creates columns that are at least 250px wide */
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 25px;
    }

    .timeline-item {
      background-color: #fcfcfc;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 15px;
      margin: 0; /* Resets default browser margin for <figure> */
      text-align: center;
      box-shadow: 0 4px 6px rgba(0,0,0,0.03);
      transition: transform 0.2s ease-in-out;
    }

    /* Subtle hover effect */
    .timeline-item:hover {
      transform: translateY(-4px);
    }

    .timeline-item img {
      max-width: 100%;
      height: auto;
      border-radius: 4px;
      margin-bottom: 12px;
      border: 1px solid #eee;
      cursor: pointer; /* Makes it clear the image is clickable */
      transition: opacity 0.2s;
    }

    .timeline-item img:hover {
      opacity: 0.85; /* Slight fade on hover to indicate clickability */
    }

    .timeline-item figcaption {
      font-size: 0.95em;
      color: #555;
      line-height: 1.5;
    }

    /* --- NEW: Lightbox Modal Styles --- */
    .modal {
      display: none; /* Hidden by default */
      position: fixed; 
      z-index: 1000; /* Sit on top of everything */
      padding-top: 60px; 
      left: 0;
      top: 0;
      width: 100%; 
      height: 100%; 
      overflow: auto; /* Enable scroll if needed */
      background-color: rgba(0,0,0,0.9); /* Black w/ opacity */
    }

    .modal-content {
      margin: auto;
      display: block;
      max-width: 90%;
      max-height: 80vh;
      border-radius: 8px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      animation-name: zoom;
      animation-duration: 0.3s;
    }

    #modalCaption {
      margin: auto;
      display: block;
      width: 80%;
      max-width: 700px;
      text-align: center;
      color: #ccc;
      padding: 15px 0;
      font-size: 1.1em;
      line-height: 1.5;
      animation-name: zoom;
      animation-duration: 0.3s;
    }

    @keyframes zoom {
      from {transform: scale(0.95); opacity: 0;} 
      to {transform: scale(1); opacity: 1;}
    }

    .close-modal {
      position: absolute;
      top: 15px;
      right: 35px;
      color: #f1f1f1;
      font-size: 40px;
      font-weight: bold;
      transition: 0.3s;
      cursor: pointer;
    }

    .close-modal:hover,
    .close-modal:focus {
      color: #bbb;
      text-decoration: none;
      cursor: pointer;
    }

    /* Mobile adjustments */
    @media (max-width: 768px) {
      .bio-container {
        flex-direction: column;
        align-items: center;
      }
      .bio-photo img {
        width: 220px;
      }
      .gallery-grid {
        grid-template-columns: 1fr; /* 1 column on small mobile screens */
      }
      .modal-content {
        max-width: 95%;
      }
    }
  </style>

<div id="imageModal" class="modal">
  <span class="close-modal">&times;</span>
  <img class="modal-content" id="modalImage">
  <div id="modalCaption"></div>
</div>

<script>
  // Get the modal elements
  const modal = document.getElementById("imageModal");
  const modalImg = document.getElementById("modalImage");
  const captionText = document.getElementById("modalCaption");
  const closeBtn = document.querySelector(".close-modal");

  // Get all images inside the gallery timeline
  const images = document.querySelectorAll(".timeline-item img");

  // Loop through images and add a click event listener to each
  images.forEach(img => {
    img.addEventListener("click", function() {
      modal.style.display = "block"; // Show the modal
      modalImg.src = this.src;       // Set the high-res image source
      
      // Grab the HTML from the caption right below the image to display in the modal
      const figcaption = this.nextElementSibling;
      if (figcaption) {
        captionText.innerHTML = figcaption.innerHTML;
      }
    });
  });

  // Close the modal when clicking the 'X'
  closeBtn.onclick = function() {
    modal.style.display = "none";
  }

  // Close the modal when clicking anywhere on the dark background
  window.onclick = function(event) {
    if (event.target === modal) {
      modal.style.display = "none";
    }
  }
</script>

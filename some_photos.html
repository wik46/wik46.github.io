<!DOCTYPE html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vikus van Rensburg</title>

  <link rel="stylesheet" href="assets/css/style.css">

  <style>
    /* Existing Bio Styles */
    .bio-container {
      display: flex;
      align-items: flex-start;
      gap: 30px;
      margin-bottom: 40px;
    }

    .bio-text {
      flex: 1;
    }

    .bio-photo img {
      width: 280px;
      height: auto;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    /* --- NEW: Photo Timeline Styles --- */
    .photo-timeline {
      margin-top: 50px;
    }

    .photo-timeline h2 {
      margin-bottom: 30px;
      border-bottom: 2px solid #eee;
      padding-bottom: 10px;
    }

    .gallery-grid {
      display: grid;
      /* Automatically creates columns that are at least 250px wide */
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 25px;
    }

    .timeline-item {
      background-color: #fcfcfc;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 15px;
      margin: 0; /* Resets default browser margin for <figure> */
      text-align: center;
      box-shadow: 0 4px 6px rgba(0,0,0,0.03);
      transition: transform 0.2s ease-in-out;
    }

    /* Subtle hover effect */
    .timeline-item:hover {
      transform: translateY(-4px);
    }

    .timeline-item img {
      max-width: 100%;
      height: auto;
      border-radius: 4px;
      margin-bottom: 12px;
      border: 1px solid #eee;
    }

    .timeline-item figcaption {
      font-size: 0.95em;
      color: #555;
      line-height: 1.5;
    }

    /* Mobile adjustments */
    @media (max-width: 768px) {
      .bio-container {
        flex-direction: column;
        align-items: center;
      }
      .bio-photo img {
        width: 220px;
      }
      .gallery-grid {
        grid-template-columns: 1fr; /* 1 column on small mobile screens */
      }
    }
  </style>

  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['\\(', '\\)']],
        displayMath: [['\\[', '\\]']]
      },
      svg: { fontCache: 'global' }
    };
  </script>

  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
</head>
